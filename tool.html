<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>画像並び替えツール</title>
  <!-- A-3: CSP（許可ドメインを明示し、外部スクリプト注入を防止） -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdnjs.cloudflare.com;
    style-src  'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src   https://fonts.gstatic.com;
    connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;
    img-src    'self' data: blob:;
    frame-src  'none';
    object-src 'none';
  ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── B-1: ログインページと統一したデザイントークン ── */
    :root {
      --bg:             #0f172a;
      --card:           #1e293b;
      --card-hover:     #253347;
      --surface:        rgba(255,255,255,.04);
      --border:         rgba(148,163,184,.15);
      --border-bright:  rgba(148,163,184,.28);
      --muted:          #94a3b8;
      --text:           #e2e8f0;
      --text-dim:       #cbd5e1;
      --primary:        #60a5fa;
      --primary-strong: #3b82f6;
      --primary-bg:     rgba(96,165,250,.12);
      --ring:           rgba(96,165,250,.3);
      --danger:         #ef4444;
      --danger-bg:      rgba(239,68,68,.12);
      --ok:             #10b981;
      --ok-bg:          rgba(16,185,129,.12);
      --warning:        #f59e0b;
      --warning-bg:     rgba(245,158,11,.12);
      --sel:            #f97316;
      --sel-bg:         rgba(249,115,22,.15);
    }

    html.guard-wait { visibility: hidden !important; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background:
        radial-gradient(1200px 500px at 10% -5%, rgba(96,165,250,.15), transparent 55%),
        radial-gradient(800px 400px at 90% 5%,  rgba(16,185,129,.12), transparent 55%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── ヘッダー ── */
    .header {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.05rem; font-weight: 600; letter-spacing: .02em;
    }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      display: grid; place-items: center; font-size: 1.1rem;
      box-shadow: 0 4px 12px rgba(59,130,246,.35);
      flex-shrink: 0;
    }
    .header-spacer { flex: 1; }
    .user-badge {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px 5px 7px;
      font-size: .8rem; color: var(--muted);
    }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary-bg); border: 1px solid var(--primary);
      display: grid; place-items: center; font-size: 11px; flex-shrink: 0;
    }
    .user-email { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── ツールバー ── */
    .toolbar {
      background: rgba(15,23,42,.85);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      backdrop-filter: blur(6px);
    }
    .sep { width: 1px; height: 26px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

    /* ── ボタン共通 ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 13px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      cursor: pointer; font-size: .85rem; font-weight: 500; font-family: inherit;
      white-space: nowrap;
      transition: background .16s, border-color .16s, box-shadow .16s, opacity .16s, filter .16s;
    }
    .btn:hover:not(:disabled) { background: rgba(255,255,255,.08); border-color: var(--border-bright); }
    .btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

    .btn.primary {
      background: linear-gradient(180deg, var(--primary), var(--primary-strong));
      border-color: transparent; color: white;
      box-shadow: 0 6px 18px rgba(59,130,246,.28);
    }
    .btn.primary:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 8px 22px rgba(59,130,246,.38); }

    .btn.ok-btn { background: var(--ok-bg); border-color: rgba(16,185,129,.3); color: var(--ok); }
    .btn.ok-btn:hover:not(:disabled) { background: rgba(16,185,129,.2); }

    .btn.danger { background: var(--danger-bg); border-color: rgba(239,68,68,.3); color: var(--danger); }
    .btn.danger:hover:not(:disabled) { background: rgba(239,68,68,.2); }

    .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
    .btn.ghost:hover:not(:disabled) { background: var(--surface); border-color: var(--border); color: var(--text); }

    .file-input { display: none; }

    /* スライダー */
    .slider-group { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: .82rem; }
    .slider { width: 100px; height: 4px; accent-color: var(--primary); cursor: pointer; }
    .slider-val { color: var(--text-dim); font-size: .8rem; min-width: 40px; }

    /* ── ステータスバー ── */
    .statusbar {
      padding: 7px 24px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      font-size: .8rem; color: var(--muted);
      min-height: 36px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 2px 8px;
    }
    .badge.ok-b  { background: var(--ok-bg);      border-color: rgba(16,185,129,.3);  color: var(--ok); }
    .badge.warn  { background: var(--warning-bg); border-color: rgba(245,158,11,.3);  color: var(--warning); }
    .badge.sel-b { background: var(--sel-bg);     border-color: rgba(249,115,22,.3);  color: var(--sel); }

    /* プログレス */
    .progress-wrap { display: none; flex: 1; min-width: 120px; }
    .prog-track { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
    .prog-fill  { height: 100%; width: 0%; border-radius: 2px;
                  background: linear-gradient(90deg, var(--primary), var(--ok)); transition: width .2s; }
    .prog-text  { font-size: .78rem; color: var(--muted); margin-top: 3px; }

    /* ── メインエリア ── */
    .main { flex: 1; padding: 20px 24px; overflow: auto; }

    /* ── B-3: ドロップゾーン（空き状態） ── */
    .drop-zone {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; min-height: 420px;
      border: 2px dashed var(--border); border-radius: 20px;
      background: var(--surface);
      cursor: pointer; text-align: center; padding: 48px 24px;
      transition: border-color .18s, background .18s;
    }
    .drop-zone.visible { display: flex; }
    .drop-zone.drag-active { border-color: var(--primary); background: var(--primary-bg); }
    .dz-icon  { font-size: 3.5rem; opacity: .55; }
    .dz-title { font-size: 1.2rem; font-weight: 600; }
    .dz-sub   { font-size: .88rem; color: var(--muted); line-height: 1.7; }
    .dz-btn {
      margin-top: 6px; padding: 12px 30px; border-radius: 14px;
      background: linear-gradient(180deg, var(--primary), var(--primary-strong));
      color: white; border: none; font-size: .95rem; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 22px rgba(59,130,246,.3);
      transition: filter .18s;
    }
    .dz-btn:hover { filter: brightness(1.1); }

    /* ── ギャラリー ── */
    .gallery-wrap { display: none; }
    .gallery-wrap.has-images { display: block; }
    .gallery-wrap.file-drag-active .gallery-grid {
      outline: 2px dashed var(--primary); outline-offset: 6px; border-radius: 14px;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--col-width, 200px), 1fr));
      gap: 14px;
    }

    /* ── B-2: 画像カード ── */
    .image-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      cursor: grab;
      transition: box-shadow .18s, border-color .18s, transform .14s;
    }
    .image-item:hover { box-shadow: 0 10px 28px rgba(0,0,0,.35); border-color: var(--border-bright); transform: translateY(-2px); }
    .image-item:active { cursor: grabbing; }
    .image-item.selected  { border-color: var(--sel); box-shadow: 0 0 0 2px rgba(249,115,22,.3); }
    .image-item.drag-over { border-color: var(--primary); box-shadow: 0 0 0 2px var(--ring); background: var(--card-hover); }

    .img-viewport {
      position: relative; width: 100%; height: var(--img-height, 200px);
      background: #060d1a;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .img-preview {
      width: 100%; height: 100%; object-fit: contain; display: block;
      pointer-events: none; -webkit-user-drag: none;
    }
    .img-num {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
      color: white; font-size: .72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,.1);
    }
    .img-sel-mark {
      position: absolute; top: 8px; right: 8px;
      background: var(--sel); color: white;
      font-size: .68rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; display: none;
    }
    .image-item.selected .img-sel-mark { display: block; }

    .img-footer { padding: 8px 10px; border-top: 1px solid var(--border); }
    .img-name {
      font-size: .76rem; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* kb hint */
    .kb-hint { font-size: .75rem; color: var(--muted); opacity: .65; }

    /* ── トースト通知 ── */
    .toast-box {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 999;
    }
    .toast {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 16px;
      font-size: .85rem; color: var(--text);
      box-shadow: 0 10px 36px rgba(0,0,0,.45);
      max-width: 320px; animation: toastIn .2s ease;
    }
    .toast.ok    { border-color: rgba(16,185,129,.4); }
    .toast.error { border-color: rgba(239,68,68,.4); }
    .toast.info  { border-color: rgba(96,165,250,.4); }
    .toast.warn  { border-color: rgba(245,158,11,.4); }
    @keyframes toastIn { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:none; } }

    /* レスポンシブ */
    @media (max-width: 640px) {
      .header, .toolbar, .statusbar, .main { padding-left: 14px; padding-right: 14px; }
      .slider { width: 70px; }
      .user-email { display: none; }
    }

    img { pointer-events: none; -webkit-user-drag: none; }
  </style>

  <!-- Firebase認証ガード（画面表示前に確認） -->
  <script>
    const _fbConfig = {
      apiKey:        "AIzaSyD9D6IE-FdCYOKqVzPpl7E8qK7njnBxqfQ",
      authDomain:    "image-sorter-5a77d.firebaseapp.com",
      projectId:     "image-sorter-5a77d",
      storageBucket: "image-sorter-5a77d.appspot.com"
    };
    document.documentElement.classList.add('guard-wait');

    let auth, db;
    try {
      firebase.initializeApp(_fbConfig);
      auth = firebase.auth();
      db   = firebase.firestore();

      function getDeviceId() {
        const k = 'deviceId_v1';
        let id = localStorage.getItem(k);
        if (!id) { id = 'dev_' + crypto.getRandomValues(new Uint32Array(4)).join('-'); localStorage.setItem(k, id); }
        return id;
      }

      async function canEnterTool(user) {
        try {
          const did = getDeviceId();
          const col = db.collection('users').doc(user.uid).collection('sessions');
          const snap = await col.where('active', '==', true).get();
          let other = false;
          snap.forEach(d => { if (d.data().deviceId !== did) other = true; });
          if (other) return false;
          await col.doc(did).set({ active: true, deviceId: did, userAgent: navigator.userAgent,
            lastSeenAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
          return true;
        } catch (e) { console.error(e); return true; }
      }

      window.signOutEverywhere = async function () {
        try {
          const user = auth.currentUser;
          const did = getDeviceId();
          if (user) await db.collection('users').doc(user.uid).collection('sessions').doc(did)
            .update({ active: false, lastSeenAt: firebase.firestore.FieldValue.serverTimestamp() });
          await auth.signOut();
        } finally { location.href = 'index.html'; }
      };

      auth.onAuthStateChanged(async user => {
        if (!user) { location.href = 'index.html'; return; }
        const ok = await canEnterTool(user);
        if (!ok) { alert('このアカウントは別の端末で使用中です。'); location.href = 'index.html'; return; }

        const el = document.getElementById('userEmail');
        if (el) el.textContent = user.email;
        document.documentElement.classList.remove('guard-wait');

        // ハートビート（60秒ごとにセッション更新）
        setInterval(async () => {
          try {
            await db.collection('users').doc(user.uid).collection('sessions').doc(getDeviceId())
              .update({ active: true, lastSeenAt: firebase.firestore.FieldValue.serverTimestamp() });
          } catch (e) { console.warn('Heartbeat:', e); }
        }, 60000);
      });
    } catch (e) {
      console.error('Firebase初期化エラー:', e);
      document.documentElement.classList.remove('guard-wait');
    }
  </script>
</head>

<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-logo">
      <div class="logo-icon">🖼️</div>
      画像並び替えツール
    </div>
    <div class="header-spacer"></div>
    <div class="user-badge">
      <div class="user-avatar">👤</div>
      <span id="userEmail" class="user-email"></span>
    </div>
    <button onclick="signOutEverywhere()" class="btn ghost">🚪 ログアウト</button>
  </header>

  <!-- ツールバー -->
  <div class="toolbar">
    <input type="file" id="fileInput" class="file-input" multiple accept="image/*">
    <label for="fileInput" class="btn primary">＋ 画像を追加</label>

    <div class="sep"></div>

    <!-- D-1: Undo/Redo ボタン -->
    <button id="undoBtn" class="btn" disabled title="元に戻す (Ctrl+Z)">↩ 元に戻す</button>
    <button id="redoBtn" class="btn" disabled title="やり直す (Ctrl+Y)">↪ やり直す</button>

    <div class="sep"></div>

    <div class="slider-group">
      <span>🖼</span>
      <input type="range" id="sizeSlider" class="slider" min="120" max="640" value="200">
      <span id="sizeVal" class="slider-val">200px</span>
    </div>

    <div class="sep"></div>

    <button id="saveBtn"   class="btn ok-btn" disabled>💾 保存 (ZIP)</button>
    <button id="deleteBtn" class="btn danger"  disabled>🗑 削除</button>
    <button id="resetBtn"  class="btn"         disabled>🔄 全リセット</button>
  </div>

  <!-- ステータスバー -->
  <div class="statusbar">
    <span id="fileBadge"></span>
    <span id="selBadge"></span>
    <span id="batchBadge"></span>
    <div class="progress-wrap" id="progressWrap">
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-text"  id="progText"></div>
    </div>
    <span class="kb-hint" id="kbHint" style="display:none">
      Ctrl+クリックで複数選択 · Shift+クリックで範囲選択 · Delete で削除 · Ctrl+Z で元に戻す
    </span>
  </div>

  <!-- メインエリア -->
  <main class="main" id="mainArea">
    <!-- B-3: 空き状態のドロップゾーン -->
    <div class="drop-zone visible" id="dropZone">
      <div class="dz-icon">🖼️</div>
      <div class="dz-title">画像をここにドロップ</div>
      <div class="dz-sub">
        JPG・PNG・GIF・WEBP・HEIC など複数ファイルに対応<br>
        ドラッグ&ドロップまたはボタンでファイルを選択
      </div>
      <label for="fileInput" class="dz-btn">📁 ファイルを選択して追加</label>
    </div>

    <!-- ギャラリー -->
    <div class="gallery-wrap" id="galleryWrap">
      <div class="gallery-grid" id="galleryGrid"></div>
    </div>
  </main>

  <!-- トースト -->
  <div class="toast-box" id="toastBox"></div>

  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script>
    /* ─────────────────────────────────────────
       State
    ───────────────────────────────────────── */
    let images      = [];
    let selectedIds = new Set();
    let dragSrcIds  = [];
    let draggedEl   = null;

    // D-1: Undo/Redo 履歴
    let history      = [];   // 各エントリ = images配列のシャローコピー
    let historyIdx   = -1;
    const HISTORY_MAX = 20;

    const MAX_PER_BATCH       = 500;
    const MAX_FILE_SIZE_BYTES = 100 * 1024 * 1024;

    /* ─────────────────────────────────────────
       DOM refs
    ───────────────────────────────────────── */
    const fileInput   = document.getElementById('fileInput');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryWrap = document.getElementById('galleryWrap');
    const dropZone    = document.getElementById('dropZone');
    const mainArea    = document.getElementById('mainArea');
    const sizeSlider  = document.getElementById('sizeSlider');
    const sizeVal     = document.getElementById('sizeVal');
    const saveBtn     = document.getElementById('saveBtn');
    const deleteBtn   = document.getElementById('deleteBtn');
    const resetBtn    = document.getElementById('resetBtn');
    const undoBtn     = document.getElementById('undoBtn');
    const redoBtn     = document.getElementById('redoBtn');
    const fileBadge   = document.getElementById('fileBadge');
    const selBadge    = document.getElementById('selBadge');
    const batchBadge  = document.getElementById('batchBadge');
    const progressWrap= document.getElementById('progressWrap');
    const progFill    = document.getElementById('progFill');
    const progText    = document.getElementById('progText');
    const kbHint      = document.getElementById('kbHint');
    const toastBox    = document.getElementById('toastBox');

    /* ─────────────────────────────────────────
       Toast
    ───────────────────────────────────────── */
    function toast(message, type = 'info', ms = 3000) {
      const icons = { ok:'✅', error:'❌', info:'ℹ️', warn:'⚠️' };
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
      toastBox.appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity .25s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 280);
      }, ms);
    }

    /* ─────────────────────────────────────────
       D-1: Undo / Redo
    ───────────────────────────────────────── */
    function saveHistory() {
      history.length = historyIdx + 1;          // redo履歴を消去
      history.push([...images]);                // 配列の参照順をスナップショット
      if (history.length > HISTORY_MAX + 1) history.shift();
      historyIdx = history.length - 1;
      refreshUndoRedo();
    }

    function undo() {
      if (historyIdx <= 0) return;
      historyIdx--;
      images = [...history[historyIdx]];
      selectedIds.clear();
      renderAll();
      toast('元に戻しました', 'info', 1500);
    }

    function redo() {
      if (historyIdx >= history.length - 1) return;
      historyIdx++;
      images = [...history[historyIdx]];
      selectedIds.clear();
      renderAll();
      toast('やり直しました', 'info', 1500);
    }

    function refreshUndoRedo() {
      undoBtn.disabled = historyIdx <= 0;
      redoBtn.disabled = historyIdx >= history.length - 1;
    }

    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);

    /* ─────────────────────────────────────────
       ファイル処理
    ───────────────────────────────────────── */
    fileInput.addEventListener('change', e => {
      processFiles(Array.from(e.target.files));
      fileInput.value = '';
    });

    function processFiles(newFiles) {
      if (!newFiles.length) return;
      const existKeys = new Set(images.map(i => `${i.name}_${i.size}`));

      const oversized = newFiles.filter(f => f.size > MAX_FILE_SIZE_BYTES);
      if (oversized.length) toast(`${oversized.length}個のファイルが100MBを超えるため除外しました`, 'warn');

      const valid = newFiles.filter(f =>
        f && f.name && f.size && f.size <= MAX_FILE_SIZE_BYTES && !existKeys.has(`${f.name}_${f.size}`)
      );
      const dupes = newFiles.filter(f =>
        f && f.name && f.size && f.size <= MAX_FILE_SIZE_BYTES && existKeys.has(`${f.name}_${f.size}`)
      );

      const added = valid.map((file, i) => ({
        file, name: file.name,
        url: URL.createObjectURL(file),
        id:  `img-${Date.now()}-${images.length + i}`,
        size: file.size, type: file.type
      }));

      images.push(...added);
      if (added.length) toast(`${added.length}枚の画像を追加しました`, 'ok');
      if (dupes.length) toast(`${dupes.length}個の重複をスキップ`, 'warn', 2000);

      saveHistory();
      selectedIds.clear();
      renderAll();
    }

    /* ─────────────────────────────────────────
       B-3: OSからのファイルドロップ
    ───────────────────────────────────────── */
    function bindFileDrop(el) {
      el.addEventListener('dragover', e => {
        if (!e.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        el.classList.add('drag-active');
      });
      el.addEventListener('dragleave', e => {
        if (!el.contains(e.relatedTarget)) el.classList.remove('drag-active');
      });
      el.addEventListener('drop', e => {
        if (!e.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        el.classList.remove('drag-active');
        processFiles(Array.from(e.dataTransfer.files));
      });
    }
    bindFileDrop(dropZone);

    // ギャラリー表示中もメインエリアにドロップ可能
    mainArea.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('Files') || !images.length) return;
      e.preventDefault();
      galleryWrap.classList.add('file-drag-active');
    });
    mainArea.addEventListener('dragleave', e => {
      if (!mainArea.contains(e.relatedTarget)) galleryWrap.classList.remove('file-drag-active');
    });
    mainArea.addEventListener('drop', e => {
      if (!e.dataTransfer.types.includes('Files') || !images.length) return;
      e.preventDefault();
      galleryWrap.classList.remove('file-drag-active');
      processFiles(Array.from(e.dataTransfer.files));
    });

    /* ─────────────────────────────────────────
       描画
    ───────────────────────────────────────── */
    function renderAll() {
      renderGallery();
      updateStatus();
      updateButtons();
      refreshUndoRedo();
    }

    function renderGallery() {
      if (!images.length) {
        galleryWrap.classList.remove('has-images');
        dropZone.classList.add('visible');
        kbHint.style.display = 'none';
        return;
      }
      dropZone.classList.remove('visible');
      galleryWrap.classList.add('has-images');
      kbHint.style.display = '';

      galleryGrid.innerHTML = images.map((img, i) => {
        const mb  = (img.size / 1024 / 1024).toFixed(1);
        const sel = selectedIds.has(img.id) ? ' selected' : '';
        return `
          <div class="image-item${sel}" draggable="true" data-id="${img.id}">
            <div class="img-viewport">
              <img src="${img.url}" alt="${img.name}" class="img-preview"
                   loading="lazy" onerror="this.style.display='none'">
              <span class="img-num">${i + 1}</span>
              <span class="img-sel-mark">✓ 選択中</span>
            </div>
            <div class="img-footer">
              <div class="img-name" title="${img.name}">
                ${img.name}
                <span style="color:var(--muted);font-size:.7rem;">${mb}MB</span>
              </div>
            </div>
          </div>`;
      }).join('');

      setupDnD();
      applySize();
    }

    /* ─────────────────────────────────────────
       スライダー
    ───────────────────────────────────────── */
    sizeSlider.addEventListener('input', () => {
      sizeVal.textContent = `${sizeSlider.value}px`;
      applySize();
    });
    function applySize() {
      const h = parseInt(sizeSlider.value, 10);
      document.documentElement.style.setProperty('--img-height', `${h}px`);
      document.documentElement.style.setProperty('--col-width',  `${Math.round(h * 1.1)}px`);
    }
    applySize();

    /* ─────────────────────────────────────────
       ステータス表示
    ───────────────────────────────────────── */
    function updateStatus() {
      if (images.length) {
        const mb = (images.reduce((s, i) => s + i.size, 0) / 1024 / 1024).toFixed(1);
        fileBadge.innerHTML = `<span class="badge">📁 ${images.length}枚 / ${mb}MB</span>`;
      } else {
        fileBadge.innerHTML = '';
      }

      selBadge.innerHTML = selectedIds.size
        ? `<span class="badge sel-b">✓ ${selectedIds.size}枚を選択中</span>` : '';

      const batches = Math.ceil(images.length / MAX_PER_BATCH);
      batchBadge.innerHTML = images.length > MAX_PER_BATCH
        ? `<span class="badge warn">📦 ${batches}個のZIPに分割されます</span>` : '';
    }

    /* ─────────────────────────────────────────
       ボタン有効/無効
    ───────────────────────────────────────── */
    function updateButtons() {
      saveBtn.disabled   = !images.length;
      resetBtn.disabled  = !images.length;
      deleteBtn.disabled = !selectedIds.size;
    }
    updateButtons();

    /* ─────────────────────────────────────────
       画像間 Drag & Drop（並び替え）
    ───────────────────────────────────────── */
    function setupDnD() {
      document.querySelectorAll('.image-item').forEach(item => {
        item.addEventListener('dragstart',  onDragStart);
        item.addEventListener('dragover',   onDragOver);
        item.addEventListener('drop',       onDrop);
        item.addEventListener('dragend',    onDragEnd);
        item.addEventListener('dragenter',  () => { if (item !== draggedEl) item.classList.add('drag-over'); });
        item.addEventListener('dragleave',  () => item.classList.remove('drag-over'));
      });
    }

    function onDragStart(e) {
      if (e.dataTransfer.types.includes('Files')) return;
      const id = this.dataset.id;
      if (!selectedIds.has(id)) { selectedIds.clear(); selectedIds.add(id); renderGallery(); }
      draggedEl  = this;
      dragSrcIds = Array.from(selectedIds);
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', 'reorder');
    }

    function onDragOver(e) {
      if (e.dataTransfer.types.includes('Files')) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDrop(e) {
      if (e.dataTransfer.types.includes('Files')) return;
      e.preventDefault();
      this.classList.remove('drag-over');
      if (this === draggedEl) return;

      const targetId      = this.dataset.id;
      const oldTargetIdx  = images.findIndex(i => i.id === targetId);
      const dragSet       = new Set(dragSrcIds);
      const dragItems     = dragSrcIds.map(id => images.find(i => i.id === id));
      const removedBefore = images.reduce((n, img, idx) =>
        n + (dragSet.has(img.id) && idx < oldTargetIdx ? 1 : 0), 0);

      images = images.filter(i => !dragSet.has(i.id));
      const newIdx = Math.max(0, Math.min(oldTargetIdx - removedBefore, images.length));
      images.splice(newIdx, 0, ...dragItems);

      selectedIds = new Set(dragSrcIds);
      saveHistory();
      renderAll();
    }

    function onDragEnd() {
      document.querySelectorAll('.image-item').forEach(i => i.classList.remove('drag-over'));
    }

    /* ─────────────────────────────────────────
       クリック選択
    ───────────────────────────────────────── */
    galleryGrid.addEventListener('click', e => {
      const item = e.target.closest('.image-item');
      if (!item) return;
      const id = item.dataset.id;

      if (e.shiftKey && selectedIds.size) {
        const arr  = Array.from(selectedIds);
        const last = arr[arr.length - 1];
        const a    = images.findIndex(i => i.id === last);
        const b    = images.findIndex(i => i.id === id);
        const [s, t] = a < b ? [a, b] : [b, a];
        for (let i = s; i <= t; i++) selectedIds.add(images[i].id);
      } else if (e.ctrlKey || e.metaKey) {
        if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
      } else {
        selectedIds.clear();
        selectedIds.add(id);
      }
      updateButtons();
      updateStatus();
      renderGallery();
    });

    /* ─────────────────────────────────────────
       キーボードショートカット
    ───────────────────────────────────────── */
    document.addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); return; }
      if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); return; }
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIds.size) {
        e.preventDefault(); handleDelete();
      }
    });

    /* ─────────────────────────────────────────
       削除
    ───────────────────────────────────────── */
    deleteBtn.addEventListener('click', handleDelete);
    function handleDelete() {
      if (!selectedIds.size) return;
      const n = selectedIds.size;
      if (!confirm(n === 1 ? '選択された画像を削除しますか？' : `選択された ${n} 枚を削除しますか？`)) return;
      selectedIds.forEach(id => {
        const it = images.find(i => i.id === id);
        if (it?.url?.startsWith('blob:')) { try { URL.revokeObjectURL(it.url); } catch (_) {} }
      });
      images = images.filter(i => !selectedIds.has(i.id));
      selectedIds.clear();
      saveHistory();
      renderAll();
    }

    /* ─────────────────────────────────────────
       全リセット
    ───────────────────────────────────────── */
    resetBtn.addEventListener('click', () => {
      if (!images.length) return;
      if (!confirm('全ての画像をリセットしますか？')) return;
      images.forEach(it => {
        if (it.url?.startsWith('blob:')) { try { URL.revokeObjectURL(it.url); } catch (_) {} }
      });
      images = []; selectedIds.clear();
      history = []; historyIdx = -1;
      renderAll();
    });

    /* ─────────────────────────────────────────
       保存（ZIP）
    ───────────────────────────────────────── */
    saveBtn.addEventListener('click', handleSave);
    async function handleSave() {
      if (!images.length) return;
      const invalid = images.filter(img => !img.file?.size);
      if (invalid.length) { toast('一部の画像ファイルが無効です。再選択してください。', 'error'); return; }

      saveBtn.disabled = true;
      progressWrap.style.display = 'block';

      try {
        const batches = [];
        for (let i = 0; i < images.length; i += MAX_PER_BATCH) batches.push(images.slice(i, i + MAX_PER_BATCH));
        const ts = new Date().toISOString().slice(0, 10);

        for (let bi = 0; bi < batches.length; bi++) {
          const batch  = batches[bi];
          const suffix = batches.length > 1 ? `_part${bi + 1}` : '';
          progText.textContent = `ZIP ${bi + 1}/${batches.length}（${batch.length}枚）を処理中…`;
          await processBatch(batch, `sorted_images_${ts}${suffix}.zip`, bi, batches.length);
          await new Promise(r => setTimeout(r, 80));
        }

        const msg = batches.length > 1
          ? `${batches.length}個のZIPに分割して保存しました`
          : `${images.length}枚の画像を保存しました`;
        toast(msg, 'ok', 4000);
      } catch (err) {
        console.error(err);
        toast(`保存エラー: ${err.message}`, 'error', 5000);
      } finally {
        progressWrap.style.display = 'none';
        progFill.style.width = '0%';
        saveBtn.disabled = false;
        updateButtons();
      }
    }

    async function processBatch(batch, filename, bi, total) {
      const zip = new JSZip();
      for (let i = 0; i < batch.length; i++) {
        const img = batch[i];
        progFill.style.width = `${Math.min(((bi * MAX_PER_BATCH + i + 1) / images.length) * 100, 100)}%`;
        try {
          if (typeof img.file?.arrayBuffer !== 'function') continue;
          const ext       = img.name.match(/\.([^.]+)$/)?.[1] ?? '';
          const globalIdx = images.indexOf(img);
          const newName   = ext ? `${globalIdx + 1}.${ext}` : `${globalIdx + 1}`;
          zip.file(newName, await img.file.arrayBuffer());
        } catch (e) { console.error(`Error: ${img.name}`, e); }
        if (i % 50 === 0) await new Promise(r => setTimeout(r, 8));
      }
      const blob = await zip.generateAsync({
        type: 'blob', compression: 'DEFLATE',
        compressionOptions: { level: 3 }, streamFiles: true
      });
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
    }
  </script>
</body>
</html>
